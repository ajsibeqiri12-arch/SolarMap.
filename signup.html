<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Regjistrohu | SolarMap</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Krijo Llogari</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Emri i përdoruesit" required>
            <input type="password" name="password" placeholder="Fjalëkalimi" required>
            <button type="submit">Regjistrohu</button>
        </form>
        <p style="margin-top:15px; font-size:0.9rem;">Keni llogari? <a href="/login">Hyni këtu</a></p>
    </div>
</body>
</html>
